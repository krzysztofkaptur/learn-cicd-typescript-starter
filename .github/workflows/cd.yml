name: cd

on:
  push:
    branches: [main]

env:
  IMAGE_URL: us-central1-docker.pkg.dev/notely-495913/notely-ar-repo/notely:latest

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Node env
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependecies
        run: npm ci

      - name: Build the app
        run: npm run build

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: Build image
        run: gcloud builds submit --tag $IMAGE_URL .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image $IMAGE_URL --region us-central1 --allow-unauthenticated --project notely-495913 --max-instances=4