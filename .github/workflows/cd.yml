name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Node env
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependecies
        run: npm ci

      - name: Build the app
        run: npm run build